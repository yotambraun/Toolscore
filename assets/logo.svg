<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" width="520" height="128">
  <!-- Icon tile: 112x112, centered vertically in 128px height => y=8 -->
  <!-- Rounded-square tile background: indigo #1E1B4B, corner radius ~24 (scaled from 56/256*112) -->
  <rect x="0" y="8" width="112" height="112" rx="24" ry="24" fill="#1E1B4B"/>

  <!-- Gauge arc: center (56, 60), radius 32 -->
  <!-- 210deg start: x=56+32*cos(210)=56-27.7=28.3, y=60+32*sin(210)=60-16=44 -->
  <!-- 330deg end:   x=56+32*cos(330)=56+27.7=83.7, y=60+32*sin(330)=60-16=44 -->
  <path d="M 28.3 44 A 32 32 0 1 1 83.7 44"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"/>

  <!-- Checkmark: teal, bold -->
  <!-- Scaled proportionally: left-foot(37,60), knee(50,72), tip(76,42) -->
  <path d="M 37 60 L 50 72 L 76 42"
        fill="none"
        stroke="#22D3A0"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Score bar ticks (bottom-right of tile) -->
  <!-- Bottom anchor y=108, x positions 72,82,92 -->
  <rect x="70" y="97" width="6" height="11" rx="2" ry="2" fill="#22D3A0" opacity="0.45"/>
  <rect x="80" y="90" width="6" height="18" rx="2" ry="2" fill="#22D3A0" opacity="0.7"/>
  <rect x="90" y="83" width="6" height="25" rx="2" ry="2" fill="#22D3A0" opacity="1.0"/>

  <!-- Wordmark: "toolscore" lowercase, Inter 700, letter-spacing tight -->
  <!-- Baseline at y=84 (vertically centered in 128px: cap-height ~50px, so baseline ~84) -->
  <!-- "tool" in indigo #1E1B4B, "score" in teal #22D3A0 -->
  <text x="128" y="84"
        font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="64"
        letter-spacing="-1"
        fill="#1E1B4B"
        xml:space="preserve"><tspan fill="#1E1B4B">tool</tspan><tspan fill="#22D3A0">score</tspan></text>
</svg>
